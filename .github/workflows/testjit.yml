  run-codegen-riscv:
    name: Run Code Generator (Cranelift)

    runs-on: ubuntu-latest

    strategy:
      max-parallel: 1
      fail-fast: true

      matrix:
        target:
          - riscv64gc-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly

      - name: Setup Cross
        run: |
          cargo install cross --git https://github.com/cross-rs/cross

          cross run --example testjit --target ${{ matrix.target }}

  run-codegen:
    name: Run Code Generator (Cranelift)

    strategy:
      max-parallel: 1
      fail-fast: true

      matrix:
        os:
          [
            windows-11-arm,
            windows-latest,
            ubuntu-latest,
            ubuntu-24.04-arm,
            macos-26-intel,
            macos-26,
          ]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly

      - name: Run Codegen
        run: cargo run --example testjit
